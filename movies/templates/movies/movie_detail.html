<h1>{{ movie.title }} ({{ movie.year }})</h1>
<p>{{ movie.description }}</p>

<h2>Reviews</h2>
<ul>
    {% for review in movie.reviews.all %}
        <li>
            <strong>{{ review.rating }}/10</strong>
            - {{ review.text }}
        </li>
    {% empty %}
        <p>No reviews yet.</p>
    {% endfor %}
</ul>
